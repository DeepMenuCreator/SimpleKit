name: Build SimpleKits

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Позволяет запускать сборку вручную

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код из репозитория
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Устанавливаем Java 21 (требуется для Paper 1.21.4)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 3. Компилируем проект через Maven
    - name: Build with Maven
      run: mvn clean package --file pom.xml

    # 4. Выгружаем готовый .jar файл в артефакты GitHub
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SimpleKits-Plugin
        path: target/*.jar
